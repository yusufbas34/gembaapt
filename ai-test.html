<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>GembaGPT AI Test</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#fff;--bg2:#f6f5f2;--bg3:#eeedea;--text:#1a1a18;--text2:#6b6b67;--text3:#aeaea9;--border:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.16);--accent:#1a1a18;--green:#1a9e6e;--red:#e03e3e;--yellow:#c8900a;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:0 0 80px}
.hdr{text-align:center;padding:24px 20px 16px}
.hdr h1{font-size:22px;font-weight:600;letter-spacing:-.4px}
.hdr h1 span{color:var(--text2);font-weight:400}
.badge{display:inline-block;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:100px;padding:4px 12px;font-size:11px;color:var(--text2);margin-top:6px}
.tabs{display:flex;padding:0 16px;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-radius:10px;background:var(--bg2);transition:all .15s}
.tab.on{background:var(--accent);color:#fff}
.pg{display:none;padding:0 16px}
.pg.on{display:block}
.card{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
select,textarea{width:100%;padding:12px 14px;border:0.5px solid var(--bd2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;-webkit-appearance:none}
textarea{resize:vertical;line-height:1.6}
.btn{width:100%;padding:14px;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px}
.bp{background:var(--accent);color:#fff}
.bs{background:var(--bg2);color:var(--text);border:0.5px solid var(--bd2)}
.steps{display:flex;gap:6px;margin-bottom:14px}
.stp{flex:1;height:3px;border-radius:2px;background:var(--bg3)}
.stp.done{background:var(--green)}.stp.act{background:var(--accent)}
.rcard{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px;border:0.5px solid var(--border)}
.rcard.ok{border-color:var(--green)}.rcard.skip{opacity:.6}
.rtxt{font-size:14px;line-height:1.5;margin-bottom:8px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px}
.tm{background:var(--bg3);color:var(--text2);border:0.5px solid var(--bd2)}
.tmodel{background:#e6fff4;color:#007050;border:0.5px solid #99ddc8}
.tai{background:#ede8ff;color:#5040a0;border:0.5px solid #c4b8f0}
.tkw{background:#e8f0fe;color:#1a56b0;border:0.5px solid #b0c8f8}
.tbg{background:#e1f5ee;color:#085041;border:0.5px solid #99d4c0}
.tkl{background:#fef3cd;color:#7a5200;border:0.5px solid #e8d080}
.rbtns{display:flex;gap:8px;flex-wrap:wrap}
.rbtn{padding:7px 14px;border-radius:8px;font-size:13px;border:0.5px solid var(--bd2);background:none;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif}
.rbtn.ok{border-color:var(--green);color:var(--green)}
.rbtn.sk{border-color:var(--red);color:var(--red)}
.redit{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.rlab{font-size:11px;color:var(--text3);margin-bottom:4px}
.log{background:var(--bg3);border-radius:var(--r);padding:12px;font-size:12px;color:var(--text2);max-height:160px;overflow-y:auto;line-height:1.8;margin-bottom:12px;font-family:monospace}
.acc-mag{margin-bottom:8px;border:0.5px solid var(--bd2);border-radius:12px;overflow:hidden}
.acc-mhdr{padding:12px 16px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.acc-mbody{display:none;padding:8px}
.acc-mbody.open{display:block}
.acc-bg{margin-bottom:6px;border:0.5px solid var(--border);border-radius:8px;overflow:hidden}
.acc-bhdr{padding:10px 12px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.acc-bbody{display:none;padding:8px 12px}
.acc-bbody.open{display:block}
.kl-box{margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px;border:0.5px solid var(--border)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.chip{display:flex;align-items:center;gap:3px;background:var(--bg2);border:0.5px solid var(--border);border-radius:100px;padding:4px 10px;font-size:12px;color:var(--text2)}
.chip button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0;line-height:1}
.kadd{display:flex;gap:6px}
.kinput{flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.kbtn{background:none;border:0.5px solid var(--bd2);border-radius:8px;padding:8px 12px;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap}
.upload{border:1.5px dashed var(--bd2);border-radius:12px;padding:28px;text-align:center;cursor:pointer;background:var(--bg2)}
.mstats{display:flex;gap:8px;margin:12px 0}
.mstat{flex:1;background:var(--bg2);border-radius:10px;padding:10px;text-align:center}
.mstn{font-size:18px;font-weight:600;color:var(--accent)}
.mstl{font-size:11px;color:var(--text3);margin-top:2px}
.mtbl{width:100%;border-collapse:collapse;font-size:13px}
.mtbl th{text-align:left;padding:8px;background:var(--bg3);color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase}
.mtbl td{padding:8px;border-bottom:0.5px solid var(--border)}
.srch{width:100%;padding:10px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;margin-bottom:10px}
</style>
</head>
<body>
<div class="hdr">
  <h1>Gemba<span>GPT</span></h1>
  <div class="badge">🧪 AI Analiz — Test Modu</div>
</div>

<div class="tabs">
  <div class="tab on" id="tab-a" onclick="goTab('a')">🔍 Analiz</div>
  <div class="tab" id="tab-k" onclick="goTab('k')">⚙️ Kelimeler</div>
  <div class="tab" id="tab-m" onclick="goTab('m')">📦 Modeller</div>
</div>

<!-- ANALİZ -->
<div class="pg on" id="pg-a">
  <div class="steps">
    <div class="stp act" id="s1"></div>
    <div class="stp" id="s2"></div>
    <div class="stp" id="s3"></div>
  </div>
  <div id="a1">
    <div id="magBlocks"></div>
    <button class="btn bs" onclick="addBlock()">+ MAG Ekle</button>
    <button class="btn bp" onclick="runAnalysis()">🔍 Analiz Et</button>
  </div>
  <div id="a2" style="display:none">
    <div id="phase" style="font-size:13px;color:var(--text2);margin-bottom:10px"></div>
    <div id="logbox" class="log" style="display:none"></div>
    <div id="rlist"></div>
    <div id="a2btns" style="display:none">
      <button class="btn bs" style="width:52px;flex-shrink:0" onclick="backToInput()">←</button>
      <button class="btn bp" onclick="confirmAll()">✓ Tümünü Onayla</button>
    </div>
  </div>
  <div id="a3" style="display:none">
    <div class="card">
      <div class="lbl">Sonuç</div>
      <div id="summary"></div>
    </div>
    <button class="btn bs" onclick="restart()">← Yeni Analiz</button>
    <button class="btn bp" onclick="copyResult()">📋 Kopyala</button>
  </div>
</div>

<!-- KELİMELER -->
<div class="pg" id="pg-k">
  <div class="card" style="padding:0;overflow:hidden">
    <div id="kwlist"></div>
  </div>
  <button class="btn bs" onclick="addRule()">+ Yeni Kural Ekle</button>
  <button class="btn bp" onclick="saveKW()">💾 Kaydet</button>
</div>

<!-- MODELLER -->
<div class="pg" id="pg-m">
  <div class="card">
    <div class="lbl">Model Listesi Yükle</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Format: <strong>MAG | BG | KLASMAN | MODEL ADI</strong> — Her satır bir model</div>
    <div class="upload" onclick="document.getElementById('csvf').click()">
      <div style="font-size:28px;margin-bottom:6px">📂</div>
      <div style="font-size:14px;color:var(--text2)">Dosya seç veya sürükle bırak</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">Excel → Farklı Kaydet → CSV UTF-8</div>
    </div>
    <input type="file" id="csvf" accept=".csv,.txt" style="display:none" onchange="loadCSV(this)"/>
  </div>
  <div id="mstats" style="display:none">
    <div class="mstats">
      <div class="mstat"><div class="mstn" id="sm">0</div><div class="mstl">Model</div></div>
      <div class="mstat"><div class="mstn" id="sa">0</div><div class="mstl">MAG</div></div>
      <div class="mstat"><div class="mstn" id="sb">0</div><div class="mstl">BG</div></div>
    </div>
    <input class="srch" id="msrch" placeholder="Model ara..." oninput="renderMtbl()"/>
    <div style="overflow:auto;max-height:350px;border-radius:var(--r);border:0.5px solid var(--border)">
      <table class="mtbl"><thead><tr><th>Model</th><th>MAG</th><th>BG</th><th>Klasman</th></tr></thead>
      <tbody id="mbody"></tbody></table>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bp" onclick="saveMDB()">💾 Kaydet</button>
      <button class="btn bs" onclick="clearMDB()">🗑 Temizle</button>
    </div>
  </div>
</div>

function nr(s){

    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/İ/g,'i').replace(/Ğ/g,'g').replace(/Ü/g,'u')
    .replace(/Ş/g,'s').replace(/Ö/g,'o').replace(/Ç/g,'c');
}

// ═══ KW MATCH ═══
function kwMatch(text, mag){
  var n = nr(text);

  // 1. Model DB
  for(var i=0; i<MDB.length; i++){
    var m = MDB[i];
    if(m.mag && m.mag !== mag) continue;
    var parts = m.normalized.split(' ').filter(function(p){ return p.length>2; });
    if(!parts.length) continue;
    var hits = 0;
    parts.forEach(function(p){ if(n.includes(p)) hits++; });
    if(hits > 0 && hits >= Math.ceil(parts.length*0.6)){
      return {bg:m.bg, kl:m.kl, src:'model', model:m.model};
    }
  }

  // 2. KW rules
  for(var i=0; i<KW.length; i++){
    var rule = KW[i];
    if(rule.mag && rule.mag !== mag) continue;
    var md = ERKEK[mag];
    if(!md || !md.bg.includes(rule.bg)) continue;
    for(var j=0; j<rule.kw.length; j++){
      if(n.includes(nr(rule.kw[j]))){
        return {bg:rule.bg, kl:rule.kl||null, src:'kw'};
      }
    }
  }

  return {bg:null, kl:null, src:'empty'};
}

// ═══ ANALYSIS ═══
function runAnalysis(){
  var blocks = document.querySelectorAll('#magBlocks .card');
  var all = [];
  blocks.forEach(function(b){
    var mag = b.querySelector('.bsel').value;
    var raw = b.querySelector('.btxt').value.trim();
    if(mag && raw){
      raw.split('\n').forEach(function(line){
        var t=line.trim();
        if(t) all.push({mag:mag, text:t});
      });
    }
  });

  if(!all.length){ alert('En az bir MAG ve geri bildirim girin!'); return; }

  document.getElementById('s1').className='stp done';
  document.getElementById('s2').className='stp act';
  document.getElementById('a1').style.display='none';
  document.getElementById('a2').style.display='block';
  document.getElementById('logbox').style.display='block';
  document.getElementById('a2btns').style.display='none';
  logLines=[];
  RES=[];

  // Phase 1
  document.getElementById('phase').innerHTML='<span style="color:#1a56b0;font-weight:500">🔑 Anahtar Kelime Analizi...</span>';
  log('── Phase 1: KW ──', '#1a56b0');

  var kwRes = [];
  all.forEach(function(item, i){
    var r = kwMatch(item.text, item.mag);
    kwRes.push(r);
    if(r.bg) log('✓ '+(i+1)+'. ['+item.mag+'] '+r.src+': '+r.bg+(r.kl?' / '+r.kl:''), '#1a9e6e');
    else log('? '+(i+1)+'. ['+item.mag+'] eşleşme yok', '#c8900a');
  });

  setTimeout(function(){
    document.getElementById('phase').innerHTML='<span style="color:#5040a0;font-weight:500">🤖 Claude AI Doğrulama...</span>';
    log('── Phase 2: AI ──', '#5040a0');

    var fbs = all.map(function(a){ return a.text; });
    var mags = all.map(function(a){ return a.mag; });

    callAI(all[0].mag, fbs, kwRes, mags).then(function(aiRes){
      log('✓ AI tamamlandı', '#1a9e6e');
      buildResults(all, kwRes, aiRes);
    }).catch(function(e){
      log('⚠ AI: '+e.message+' — KW kullanılıyor', '#e03e3e');
      buildResults(all, kwRes, []);
    });
  }, 400);
}

function buildResults(all, kwRes, aiRes){
  RES = [];
  all.forEach(function(item, i){
    var ai = (aiRes||[]).find(function(a){ return a.index===i; }) || {};
    var kw = kwRes[i];
    RES.push({
      id:i, text:item.text, mag:item.mag,
      bg: ai.bg||kw.bg||null,
      kl: ai.kl||kw.kl||null,
      src: ai.bg ? (kw.src==='model'?'model':'ai') : kw.src,
      reason: ai.reason||'',
      status:'pending', edit:false
    });
    if(ai.bg && kw.bg && ai.bg!==kw.bg) log('↻ '+(i+1)+'. AI: '+kw.bg+' → '+ai.bg, '#5040a0');
  });
  document.getElementById('phase').innerHTML='<span style="color:#1a9e6e;font-weight:500">✓ Tamamlandı</span>';
  renderRes();
  document.getElementById('a2btns').style.display='flex';
}

async function callAI(mag, fbs, kwRes, mags){
  var r = await fetch('/ai/analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({mag:mag, feedbacks:fbs, kwResults:kwRes, mags:mags})
  });
  var d = await r.json();
  if(!d.ok) throw new Error(d.error||'AI hatası');
  return d.results;
}

                 r.src==='ai'?'<span class="tag tai">🤖 AI</span>':

// ═══ MODEL DB ═══
function loadCSV(inp){
  var file=inp.files[0];
  if(!file) return;
  var r=new FileReader();
  r.onload=function(e){ parseCSV(e.target.result); };
  r.readAsText(file,'UTF-8');
}

function parseCSV(txt){
  var lines=txt.split(/\r?\n/).filter(function(l){ return l.trim(); });
  var added=0, skipped=0;
  lines.forEach(function(line){
    var parts;
    if(line.includes(';')) parts=line.split(';');
    else if(line.includes('|')) parts=line.split('|');
    else if(line.includes('\t')) parts=line.split('\t');
    else parts=line.split(',');
    parts=parts.map(function(p){ return p.trim().replace(/^["']|["']$/g,''); });
    if(parts.length<4){ skipped++; return; }
    var mag=parts[0].toUpperCase().trim();
    var bg=parts[1].toUpperCase().trim();
    var kl=parts[2].toUpperCase().trim();
    var model=parts[3].trim();
    if(mag==='MAG'||!mag||!model){ skipped++; return; }
    var dup=MDB.some(function(m){ return m.mag===mag&&m.bg===bg&&m.kl===kl&&m.model===model; });
    if(!dup){
      var n=model.toLowerCase().replace(/[.,]/g,' ').replace(/\s+/g,' ').trim();
      MDB.push({mag:mag,bg:bg,kl:kl,model:model,normalized:n});
      added++;
    } else skipped++;
  });
  toast(added+' model eklendi'+(skipped?' ('+skipped+' atlandı)':''));
  showMStats();
}

function showMStats(){
  document.getElementById('mstats').style.display='block';
  document.getElementById('sm').textContent=MDB.length;
  document.getElementById('sa').textContent=[...new Set(MDB.map(function(m){ return m.mag; }))].length;
  document.getElementById('sb').textContent=[...new Set(MDB.map(function(m){ return m.bg; }))].length;
  renderMtbl();
}

function renderMtbl(){
  var q=(document.getElementById('msrch').value||'').toLowerCase();
  var f=MDB.filter(function(m){
    return !q||m.model.toLowerCase().includes(q)||m.mag.toLowerCase().includes(q)||m.bg.toLowerCase().includes(q);
  });
  var html=f.slice(0,200).map(function(m){
    return '<tr><td><strong>'+m.model+'</strong></td><td>'+m.mag+'</td><td>'+m.bg+'</td><td style="color:var(--text3)">'+m.kl+'</td></tr>';
  }).join('');
  if(f.length>200) html+='<tr><td colspan="4" style="color:var(--text3);text-align:center">+'+(f.length-200)+' daha</td></tr>';
  document.getElementById('mbody').innerHTML=html;
}

function saveMDB(){
  localStorage.setItem('gemba_mdb2', JSON.stringify(MDB));
  toast('✓ '+MDB.length+' model kaydedildi');
}

function clearMDB(){
  if(!confirm('Tüm modeller silinsin mi?')) return;
  MDB=[];
  localStorage.removeItem('gemba_mdb2');
  document.getElementById('mstats').style.display='none';
  toast('Temizlendi');
}
</script>
</body>
</html>
